<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mando Ahorcado</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪑</text></svg>">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #121212; color: white; text-align: center; margin: 0; }
        button { padding: 12px; margin: 4px; font-size: 16px; border-radius: 8px; border: none; font-weight: bold; }
        .btn-letra { width: 18%; background: #333; color: white; }
        .btn-letra:disabled { opacity: 0.2; }
        input, select { padding: 12px; width: 85%; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #222; color: white; text-align: center; }
        .setup-box { background: #1e1e1e; padding: 20px; border-radius: 15px; border-top: 5px solid #444; }
        .mi-equipo-tag { padding: 5px 15px; border-radius: 20px; font-size: 14px; margin-bottom: 10px; display: inline-block; }
        .Wuachiturros { background: #00f2ff; color: #000; }
        .Chapisa { background: #ff00ff; color: #fff; }
        .puntos-mini { background: #000; padding: 10px; border-radius: 10px; font-size: 12px; display: flex; justify-content: space-around; margin: 10px 0; }
        .btn-danger { background: #ff4444; color: white; font-size: 12px; margin-top: 30px; opacity: 0.7; }
        #timer-mobil { font-size: 24px; font-weight: bold; color: #ffeb3b; margin: 5px 0; }
        .low-time { color: #ff4444 !important; }
    </style>
</head>
<body>
    <div id="pantalla-union" class="setup-box">
        <h2>ÚNETE AL LOBBY</h2>
        <input id="lobbyCodeInput" maxlength="6" placeholder="CÓDIGO DEL LOBBY">
        <select id="equipoSelect">
            <option value="Wuachiturros">Wuachiturros</option>
            <option value="Chapisa">Chapisa</option>
        </select>
        <button onclick="unirse()" style="background: #fff; color: #000; width: 100%;">ENTRAR</button>
        <p id="joinError" style="color:#ff7272; min-height: 20px;"></p>
        <button class="btn-danger" onclick="if(confirm('¿Reiniciar todos los puntos?')) socket.emit('resetFullGame')">REINICIAR MARCADORES</button>
    </div>

    <div id="juego-container" style="display:none;">
        <div id="miTag" class="mi-equipo-tag"></div>
        <div class="puntos-mini">
            <span>W: <b id="pW">0</b></span> | <span>C: <b id="pC">0</b></span>
        </div>
        <div id="timer-mobil" style="display:none;">TIEMPO: <span>40</span>s</div>

        <div id="pantalla-setup" class="setup-box" style="display:none;">
            <h3 id="rolTag" style="margin: 5px 0;">ELEGIR PALABRA</h3>
            <p id="instruccionSetup" style="font-size: 14px;"></p>
            <input type="text" id="palabraInput" placeholder="PALABRA SECRETA">
            <input type="number" id="vidasInput" value="6">
            <button id="btn-iniciar" onclick="enviar()" style="background: #00ff00; color: #000; width: 100%;">ENVIAR PALABRA</button>
        </div>

        <div id="pantalla-juego" style="display:none;">
            <div id="infoTurno" style="padding: 10px; border-radius: 10px;"></div>
            <div id="teclado" style="margin-top: 15px;"></div>
            <button id="btn-next" onclick="socket.emit('nextRound')" style="display:none; background: #28a745; color: white; width: 100%; margin-top: 20px;">PRÓXIMA RONDA</button>
        </div>
    </div>

    <script>
        const socket = io({ reconnection: true, reconnectionAttempts: Infinity, reconnectionDelay: 500, reconnectionDelayMax: 2000 });
        let miEquipo = "", miRol = "", lastErr = 0;
        const STORAGE_KEY = 'ahorcado-mobile-session';

        function getClientSessionId() {
            const existing = localStorage.getItem(STORAGE_KEY);
            if (existing) return existing;
            const generated = (window.crypto && window.crypto.randomUUID) ? window.crypto.randomUUID() : `${Date.now()}-${Math.random().toString(36).slice(2)}`;
            localStorage.setItem(STORAGE_KEY, generated);
            return generated;
        }

        const sessionId = getClientSessionId();

        const params = new URLSearchParams(window.location.search);
        const codeParam = params.get('code');
        if (codeParam) document.getElementById('lobbyCodeInput').value = codeParam.toUpperCase();

        function unirse() {
            const lobbyCode = document.getElementById('lobbyCodeInput').value.trim().toUpperCase();
            if (!lobbyCode) {
                document.getElementById('joinError').innerText = 'Ingresa el código de lobby.';
                return;
            }

            miEquipo = document.getElementById('equipoSelect').value;
            localStorage.setItem('ahorcado-last-lobby', lobbyCode);
            localStorage.setItem('ahorcado-last-team', miEquipo);
            socket.emit('setRole', { equipo: miEquipo, lobbyCode, sessionId });
            document.getElementById('joinError').innerText = '';
        }


        function rejoinSavedSession() {
            const savedLobby = localStorage.getItem('ahorcado-last-lobby');
            const savedTeam = localStorage.getItem('ahorcado-last-team');
            if (!savedLobby || !savedTeam) return;

            miEquipo = savedTeam;
            document.getElementById('lobbyCodeInput').value = savedLobby;
            document.getElementById('equipoSelect').value = savedTeam;
            socket.emit('setRole', { equipo: miEquipo, lobbyCode: savedLobby, sessionId });
        }

        socket.on('connect', () => {
            rejoinSavedSession();
        });

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && socket.connected) rejoinSavedSession();
        });

        socket.on('lobbyRecreated', () => {
            miEquipo = "";
            miRol = "";
            localStorage.removeItem('ahorcado-last-lobby');
            document.getElementById('pantalla-union').style.display = 'block';
            document.getElementById('juego-container').style.display = 'none';
            document.getElementById('joinError').innerText = 'Se creó un lobby nuevo. Escanea el nuevo QR y vuelve a entrar.';
            document.getElementById('lobbyCodeInput').value = '';
        });

        socket.on('joinDenied', (mensaje) => {
            document.getElementById('pantalla-union').style.display = 'block';
            document.getElementById('juego-container').style.display = 'none';
            document.getElementById('joinError').innerText = mensaje;
        });

        socket.on('roleAssign', (data) => {
            miRol = data.role;
            document.getElementById('pantalla-union').style.display = 'none';
            document.getElementById('juego-container').style.display = 'block';

            const tag = document.getElementById('miTag');
            tag.innerText = "ESTÁS EN: " + miEquipo;
            tag.className = "mi-equipo-tag " + miEquipo;

            document.getElementById('pantalla-juego').style.display = 'block';
        });

        function enviar() {
            const p = document.getElementById('palabraInput').value;
            const v = document.getElementById('vidasInput').value;
            if(p) socket.emit('startGame', { palabra: p, vidas: v, equipo: miEquipo });
        }

        const divT = document.getElementById('teclado');
        "ABCDEFGHIJKLMNÑOPQRSTUVWXYZ".split('').forEach(l => {
            const b = document.createElement('button');
            b.innerText = l; b.className = 'btn-letra';
            b.onclick = () => socket.emit('intentarLetra', { letra: l, equipo: miEquipo });
            divT.appendChild(b);
        });

        socket.on('updateState', (state) => {
            document.getElementById('pW').innerText = state.puntos.Wuachiturros.adivinadas;
            document.getElementById('pC').innerText = state.puntos.Chapisa.adivinadas;

            const tMobil = document.getElementById('timer-mobil');
            if(state.estado === "JUGANDO") {
                tMobil.style.display = "block";
                tMobil.querySelector('span').innerText = state.timer;
                if(state.timer <= 10) tMobil.classList.add('low-time');
                else tMobil.classList.remove('low-time');
            } else {
                tMobil.style.display = "none";
            }

            if (!miEquipo) return;

            if (state.estado === "LOBBY") {
                document.getElementById('pantalla-setup').style.display = 'none';
                document.getElementById('pantalla-juego').style.display = 'block';
                document.getElementById('teclado').style.display = 'none';
                document.getElementById('infoTurno').innerText = 'Esperando que en TV presionen START GAME...';
                return;
            }


            if (state.estado === "MATCH_RESULT") {
                document.getElementById('pantalla-setup').style.display = 'none';
                document.getElementById('pantalla-juego').style.display = 'block';
                document.getElementById('teclado').style.display = 'none';
                document.getElementById('btn-next').style.display = 'none';
                document.getElementById('infoTurno').innerText = state.matchResultMessage || 'FIN DE PARTIDA';
                document.getElementById('infoTurno').style.background = '#444';
                return;
            }

            if (state.estado === "SETUP") {
                document.getElementById('pantalla-juego').style.display = 'none';
                document.getElementById('pantalla-setup').style.display = 'block';
                const miT = (miEquipo === state.equipoQuePonePalabra);
                document.getElementById('btn-iniciar').disabled = !miT;
                document.getElementById('btn-iniciar').style.opacity = miT ? "1" : "0.3";
                document.getElementById('instruccionSetup').innerText = miT
                    ? "Tu equipo puede enviar palabra. Se tomará la primera que llegue."
                    : "El otro equipo está eligiendo palabra...";
                document.getElementById('palabraInput').value = "";
                return;
            }

            document.getElementById('pantalla-setup').style.display = 'none';
            document.getElementById('pantalla-juego').style.display = 'block';
            document.getElementById('teclado').style.display = "block";

            const esMiT = state.turno === miEquipo;
            const terminado = state.estado.startsWith("GANO") || state.estado.startsWith("PERDIO");
            const info = document.getElementById('infoTurno');

            if (!terminado) {
                info.innerText = esMiT ? "¡TU EQUIPO ADIVINA!" : "EL RIVAL ESTÁ ADIVINANDO...";
                info.style.background = esMiT ? "#00ff0033" : "#ff000033";
                document.getElementById('btn-next').style.display = 'none';
            } else {
                info.innerText = "RONDA TERMINADA";
                info.style.background = "#333";
                document.getElementById('btn-next').style.display = 'block';
            }

            if (state.errores > lastErr && esMiT && navigator.vibrate) navigator.vibrate(200);
            lastErr = state.errores;

            document.querySelectorAll('.btn-letra').forEach(b => {
                b.disabled = !esMiT || state.letrasAdivinadas.includes(b.innerText) || terminado;
            });
        });
    </script>
</body>
</html>
